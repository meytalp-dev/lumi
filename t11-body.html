<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1e343d">
<title>Lumi · גַּעוּ בַּגּוּף</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/t11-body.css">
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body { font-family: Heebo, system-ui, sans-serif; display: flex; flex-direction: column;
    color: #fff6ec;
    background:
      linear-gradient(180deg, rgba(30,52,61,.50) 0%, rgba(30,52,61,.16) 42%, rgba(30,52,61,.6) 100%),
      center/cover no-repeat url(assets/worlds/lantern-grove/backgrounds/grove-bg.png) fixed,
      linear-gradient(180deg, #2b4a54 0%, #24404a 55%, #1e343d 100%) fixed; }
  /* ?frame=1 — deterministic 390×844 device box for screenshots */
  body.frame { width: 390px; height: 844px; margin: 24px auto; box-shadow: 0 20px 60px rgba(0,0,0,.5); position: relative; }
  html:has(body.frame) { height: auto; background: #111; overflow: auto; }

  /* ---- HUD: lantern progress rail (one glow per body-part found) ---- */
  .tb-hud { position: absolute; top: 0; inset-inline: 0; z-index: 40;
    display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
  .tb-prog { display: flex; gap: 7px; background: rgba(30,52,61,.42); padding: 8px 14px; border-radius: 999px;
    backdrop-filter: blur(6px); box-shadow: 0 4px 14px rgba(0,0,0,.25); }
  .tb-pip { width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,.20);
    position: relative; transition: background .4s ease, box-shadow .4s ease; }
  .tb-pip.lit { background: var(--lantern-glow, #fff0b0); box-shadow: 0 0 12px 3px rgba(255,240,176,.8); }
  .tb-home { font-size: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,.4)); opacity: .9; }

  /* ---- game stage (mechanic mounts here) ---- */
  #stage { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; padding-top: 44px; }

  /* ---- overlays (intro / done) — warm card DNA ---- */
  .tb-overlay { position: absolute; inset: 0; z-index: 60; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; gap: 18px; padding: 28px;
    background: radial-gradient(circle at 50% 30%, rgba(46,36,64,.30), rgba(28,51,60,.64)); }
  .tb-overlay.hidden { display: none; }
  .tb-hero { width: clamp(150px, 42vw, 220px); aspect-ratio: 0.66; background: center bottom/contain no-repeat;
    filter: drop-shadow(0 14px 20px rgba(0,0,0,.45)); animation: heroFloat 4s ease-in-out infinite; }
  .tb-hero[data-mood="idle"] { background-image: url(assets/character/lumi/lumi-body.png); }
  .tb-hero[data-mood="celebrate"] { background-image: url(assets/character/lumi/lumi-celebrate.png); aspect-ratio: 1; }
  @keyframes heroFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  .tb-overlay h1 { margin: 0; font-size: clamp(24px, 6.5vw, 34px); font-weight: 900; color: var(--dusk-deep, #22333f);
    background: rgba(255,246,236,.96); padding: 10px 24px; border-radius: 20px; box-shadow: 0 10px 26px rgba(0,0,0,.4); }
  .tb-overlay p { margin: 0; font-size: clamp(17px, 4.4vw, 21px); font-weight: 500; line-height: 1.55; color: var(--dusk-deep, #22333f);
    background: rgba(255,246,236,.92); padding: 14px 22px; border-radius: 18px; max-width: 460px; }
  .tb-overlay p b { color: var(--coral-deep, #d1573f); font-weight: 800; }
  .tb-btn-big { font-size: 21px; font-weight: 800; color: #fff6ec; border: 0; cursor: pointer;
    background: linear-gradient(180deg, var(--coral, #ef7e64), var(--coral-deep, #d1573f)); padding: 15px 42px; border-radius: 999px;
    box-shadow: 0 10px 24px rgba(224,90,74,.5); min-height: 56px; transition: transform .15s ease; }
  .tb-btn-big:active { transform: scale(.96); }
  .tb-btn-ghost { display: inline-flex; align-items: center; gap: 8px; font-size: 17px; font-weight: 700; cursor: pointer;
    color: var(--dusk-deep, #22333f); background: rgba(255,246,236,.86); border: 0; padding: 11px 26px; border-radius: 999px; min-height: 48px; }
  .tb-btn-ghost:active { transform: scale(.96); }
</style>
</head>
<body>
  <div class="tb-sky" aria-hidden="true"></div>

  <main class="tb-stage">
    <div class="tb-hud">
      <div class="tb-prog" id="prog" aria-label="חלקי גוף שנמצאו"></div>
      <div class="tb-home" title="הבית של לומי">🏠</div>
    </div>
    <div id="stage"></div>
  </main>

  <div class="tb-overlay" id="introOverlay">
    <div class="tb-hero" data-mood="idle"></div>
    <h1>גַּעוּ בַּגּוּף 🙌</h1>
    <p>לוּמִי עוֹמֵד עִם כָּל הַגּוּף 🌿<br>הַקְשִׁיבוּ לְחֵלֶק הַגּוּף, וְהוֹבִילוּ אֶת לוּמִי בַּ<b>שְּׁבִיל</b> הַנָּכוֹן.<br>אַחַר כָּךְ — גַּעוּ בְּעַצְמְכֶם בְּאוֹתוֹ חֵלֶק!</p>
    <button class="tb-btn-ghost" id="introSpeaker">🔊 הַקְשִׁיבוּ לַהֶסְבֵּר</button>
    <button class="tb-btn-big" id="startBtn">בּוֹאוּ נַתְחִיל ➜</button>
  </div>

  <div class="tb-overlay hidden" id="doneOverlay">
    <div class="tb-hero" data-mood="celebrate"></div>
    <h1>מָצָאתֶם אֶת כָּל הַגּוּף! 🎉</h1>
    <p>רֹאשׁ, שֵׂעָר, יָדַיִם וְרַגְלַיִם — גִּלִּיתֶם הַכֹּל!</p>
    <button class="tb-btn-big" id="againBtn">עוֹד פַּעַם ➜</button>
  </div>

  <script src="js/data.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/audio-clips.js"></script>\n  <script src="js/profile.js"></script>
  <script src="js/mechanics/_measured-core.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/mechanics/path-choice.js"></script>
    <script src="js/bkt.js"></script>
  <script src="js/telemetry.js"></script>
<script>
  (function () {
    'use strict';
    var q = location.search;
    if (/[?&]frame=1/.test(q)) document.body.classList.add('frame');
    if (/[?&]reset=1/.test(q)) { try { localStorage.removeItem('lumi-bkt-v1'); } catch (e) {} }

    var D = window.LUMI_DATA || { emoji: {} };
    var WORDS = ['head', 'hair', 'hands', 'feet'];   // topic: body (T11 · Touch & Go)
    // "This is my ___ / These are my ___" — Lumi names the found part (grammar-correct plural).
    var CHUNK = { head: 'This is my head!', hair: 'This is my hair!', hands: 'These are my hands!', feet: 'These are my feet!' };
    // confusable partner kept OUT of recognize distractors (the tough pair lives in the
    // discriminate bank, not this playable recognize loop): head↔hair, hands↔feet.
    var CONFUSE = { head: 'hair', hair: 'head', hands: 'feet', feet: 'hands' };
    var stageEl = document.getElementById('stage');
    var progEl = document.getElementById('prog');

    function shuffle(a) { a = a.slice(); for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }

    // lantern progress rail — one glow per body-part revealed
    var pips = WORDS.map(function () { var p = document.createElement('span'); p.className = 'tb-pip'; progEl.appendChild(p); return p; });
    function lightPips(n) { pips.forEach(function (p, i) { p.classList.toggle('lit', i < n); }); }

    // recorded-audio unlock (autoplay policy) — touch every clip once on first gesture
    function unlockAudio() {
      Object.keys(LumiAudio.clipMap).forEach(function (k) {
        try { var a = new Audio(LumiAudio.clipMap[k]); a.preload = 'auto'; var pr = a.play(); if (pr) pr.then(function () { a.pause(); a.currentTime = 0; }).catch(function () {}); } catch (e) {}
      });
    }

    // a recognize item for `word`: correct = that body-part, 2 distractors = OTHER parts
    // EXCLUDING the confusable partner (recognize stays "distinct"; head↔hair / hands↔feet
    // live in the discriminate bank). Placeholders are emoji until ART-BRIEF-t11-body.md crops land.
    function makeItem(word) {
      var pool = WORDS.filter(function (w) { return w !== word && w !== CONFUSE[word]; });
      var others = shuffle(pool).slice(0, (window.LumiProfile ? LumiProfile.distractors() : 2));
      var opts = shuffle([{ img: word, correct: true }].concat(others.map(function (o) { return { img: o, correct: false }; })));
      return { prompt: { audio_en: word }, options: opts, help_he: 'לוּמִי מְחַפֵּשׂ אֶת חֵלֶק הַגּוּף', target: [word] };
    }

    var order = shuffle(WORDS), idx = 0, lit = 0, autoplay = /[?&]autoplay=1/.test(q);
    if (autoplay) window.LUMI_AUTOPLAY = true;

    function nextRound() {
      if (idx >= order.length) return showDone();
      var word = order[idx++];
      stageEl.innerHTML = '';
      var it = makeItem(word);
      LumiPathChoice.present(stageEl, {
        item: it,
        emoji: D.emoji || {},
        targetRep: { glyph: (D.emoji && D.emoji[word]) || '❔' },
        instructionHe: idx === 1 ? 'הַקְשִׁיבוּ וְהוֹבִילוּ' : null, showInstruction: idx === 1,
        onMeasured: function (res) { LumiTelemetry.recordMeasured({ word: word, dimension: 'recognize', context: 't11-body', res: res }); },
        onDone: function () {
          lit++; lightPips(lit);
          // Lumi names the found part with the recorded "This is my ___" chunk (accent-clean).
          try { LumiAudio.english(CHUNK[word]); } catch (e) {}
          setTimeout(nextRound, 1050);
        },
      });
      // tag each trail with its body-part so the CSS can swap emoji → real crop later
      // (options render in the same order path-choice.present iterates them).
      var btns = stageEl.querySelectorAll('.trail-animal');
      for (var b = 0; b < btns.length; b++) {
        if (it.options[b]) btns[b].setAttribute('data-part', it.options[b].img);
      }
    }

    function sayHe(clipFile, fallbackText) {
      try {
        var src = 'assets/audio/words/' + clipFile;
        var a = new Audio(src);
        a.onerror = function () { try { LumiAudio.hebrew(fallbackText); } catch (e) {} };
        a.play().catch(function () { try { LumiAudio.hebrew(fallbackText); } catch (e) {} });
      } catch (e) { try { LumiAudio.hebrew(fallbackText); } catch (e2) {} }
    }

    function showDone() {
      document.getElementById('doneOverlay').classList.remove('hidden');
      sayHe('body-done-he.mp3', 'מצאתם את כל הגוף! ראש, שיער, ידיים ורגליים. כל הכבוד!');
    }

    document.getElementById('introSpeaker').addEventListener('click', function () {
      unlockAudio();
      sayHe('body-intro-he.mp3', 'לומי עומד לפנינו עם כל הגוף. הקשיבו לחלק הגוף באנגלית, והובילו את לומי בשביל הנכון. אחר כך געו בעצמכם באותו חלק.');
    });
    document.getElementById('startBtn').addEventListener('click', function () {
      unlockAudio();
      document.getElementById('introOverlay').classList.add('hidden');
      lightPips(0); nextRound();
    });
    document.getElementById('againBtn').addEventListener('click', function () {
      order = shuffle(WORDS); idx = 0; lit = 0; lightPips(0);
      document.getElementById('doneOverlay').classList.add('hidden'); nextRound();
    });

    // QA: ?autoplay=1 — skip the intro and drive automatically (autoplay hides the button path).
    if (autoplay) { document.getElementById('introOverlay').classList.add('hidden'); nextRound(); }
  })();
  </script>
</body>
</html>
