<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2e2440">
<title>Lumi · הפרופיל שלי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<style>
  /* GROWN-UP screen (parent / educator) — calm, no niqqud, Lumi sunset DNA.
     Reads the opening profile written by mapping.html; the Tier control writes
     back and the 12 games pick it up (js/profile.js). */
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { font-family: 'Heebo', system-ui, sans-serif; color: var(--ink, #3a2b2b);
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(240,149,90,.28), transparent 55%),
      linear-gradient(180deg, #2e2440 0%, #40304f 40%, #4a3a5c 100%);
    background-attachment: fixed; padding: max(18px, env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom)); }

  .shell { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  .head { display: flex; align-items: center; gap: 12px; color: #fff6ec; padding: 2px 4px; }
  .head .lumi { width: 44px; height: 44px; flex: none; border-radius: 50%;
    background: #fff6ec center/78% no-repeat url(assets/character/lumi/lumi-happy.png);
    box-shadow: 0 4px 12px rgba(0,0,0,.4); }
  .head h1 { margin: 0; font-size: clamp(19px, 5vw, 23px); font-weight: 900; }
  .head .sub { font-size: 12.5px; font-weight: 600; opacity: .85; }

  .card { background: var(--card, #fff6ec); border-radius: 22px; padding: 18px 18px;
    box-shadow: 0 12px 30px rgba(46,36,64,.34); border: 1px solid rgba(255,255,255,.5); }
  .card > h2 { margin: 0 0 12px; font-size: 15px; font-weight: 800; color: var(--dusk-deep, #2e2440);
    display: flex; align-items: center; gap: 7px; }
  .card > h2 .ic { font-size: 18px; }

  /* bottom-line — the one sentence 95% of grown-ups read */
  .bottomline { background: linear-gradient(180deg, #fff, #fff6ec); }
  .bl-band { display: inline-block; font-size: 12px; font-weight: 800; color: #7a5a12;
    background: radial-gradient(circle at 40% 35%, #ffe9a8, #ffcf5c); padding: 3px 12px; border-radius: 999px; margin-bottom: 8px; }
  .bl-text { font-size: clamp(17px, 4.4vw, 20px); font-weight: 800; line-height: 1.4; color: var(--dusk-deep, #2e2440); }

  /* acquisition ladder */
  .ladder { display: flex; flex-direction: column; gap: 8px; }
  .rung { display: flex; align-items: flex-start; gap: 11px; padding: 12px 12px; border-radius: 16px;
    background: #fbeede; border: 2px solid transparent; transition: background .2s; }
  .rung.done { background: #eef4ee; }
  .rung.here { background: #fff; border-color: var(--gold, #ffc35c); box-shadow: 0 6px 18px rgba(255,195,92,.35); }
  .rung.future { opacity: .6; }
  .rung .dot { width: 26px; height: 26px; flex: none; border-radius: 50%; display: grid; place-items: center;
    font-size: 13px; font-weight: 900; color: #fff; background: #c9bcae; margin-top: 1px; }
  .rung.done .dot { background: var(--sage-deep, #5e8f72); }
  .rung.here .dot { background: linear-gradient(180deg, var(--amber,#f5972b), var(--coral-deep,#e05a4a)); }
  .rung .body { flex: 1; min-width: 0; }
  .rung .r-cefr { font-size: 11px; font-weight: 800; color: var(--ink-soft,#7a6a68); letter-spacing: .3px; }
  .rung .r-cap { font-size: 14.5px; font-weight: 700; color: var(--dusk-deep,#2e2440); line-height: 1.35; }
  .rung .r-here { display: inline-block; margin-top: 6px; font-size: 12.5px; font-weight: 800; color: var(--coral-deep,#e05a4a); }
  .rung .r-ev { display: inline-block; margin-top: 6px; font-size: 12.5px; font-weight: 700; color: var(--sage-deep,#5e8f72); }

  /* evidence chips */
  .evrow { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { font-size: 13px; font-weight: 700; color: var(--dusk-deep,#2e2440);
    background: #fbeede; padding: 7px 12px; border-radius: 999px; }
  .chip b { color: var(--coral-deep,#e05a4a); }

  /* tier control */
  .tier-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .tier-btn { text-align: center; cursor: pointer; border: 2px solid #e7d8c4; background: #fbeede;
    border-radius: 14px; padding: 12px 6px; transition: transform .1s, border-color .2s, background .2s; }
  .tier-btn:active { transform: scale(.96); }
  .tier-btn.on { border-color: var(--coral,#f4785f); background: #fff; box-shadow: 0 6px 16px rgba(224,90,74,.28); }
  .tier-btn .t-n { font-size: 20px; font-weight: 900; color: var(--dusk-deep,#2e2440); }
  .tier-btn .t-l { font-size: 12px; font-weight: 700; color: var(--ink-soft,#7a6a68); margin-top: 2px; }
  .tier-btn .t-rec { display: block; font-size: 10.5px; font-weight: 800; color: var(--amber,#f5972b); margin-top: 3px; min-height: 13px; }
  .tier-note { margin: 10px 0 0; font-size: 12.5px; font-weight: 600; color: var(--ink-soft,#7a6a68); line-height: 1.45; }

  .caveat { font-size: 11.5px; font-weight: 600; color: rgba(255,246,236,.72); line-height: 1.5; text-align: center; padding: 0 6px; }

  .btn { display: block; width: 100%; text-align: center; font-size: 16px; font-weight: 800; cursor: pointer;
    border: 0; border-radius: 999px; padding: 14px; min-height: 54px; }
  .btn-coral { color: #fff; background: linear-gradient(180deg, var(--coral,#f4785f), var(--coral-deep,#e05a4a)); box-shadow: 0 10px 22px rgba(224,90,74,.45); }
  .btn-ghost { color: var(--dusk-deep,#2e2440); background: #fff6ec; }
  .btn:active { transform: scale(.97); }

  /* empty state */
  .empty { text-align: center; }
  .empty .big { width: 96px; height: 96px; margin: 0 auto 12px;
    background: center/contain no-repeat url(assets/character/lumi/lumi-curious.png); filter: drop-shadow(0 8px 16px rgba(0,0,0,.4)); }
  .empty p { color: var(--ink-soft,#7a6a68); font-weight: 600; line-height: 1.5; }

  .toast { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(20px);
    background: var(--dusk-deep,#2e2440); color: #fff6ec; font-size: 14px; font-weight: 700;
    padding: 12px 22px; border-radius: 999px; box-shadow: 0 10px 26px rgba(0,0,0,.5); opacity: 0;
    transition: opacity .25s, transform .25s; pointer-events: none; z-index: 30; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="shell" id="shell"></div>
  <div class="toast" id="toast"></div>

  <script>
  (function () {
    'use strict';
    var shell = document.getElementById('shell');
    var toastEl = document.getElementById('toast');

    // the 4 CEFR rungs (age-6-adjusted ladder) — capability language for grown-ups
    var RUNGS = [
      { level: 1, cefr: 'Pre-A1',  cap: 'עדיין לא מזהה מילים באנגלית — מתחילים מהבסיס, עם הרבה תמיכה.' },
      { level: 2, cefr: 'Pre-A1+', cap: 'מזהה כמה מילים מוכרות (שלום, צבע, חיה) — לרוב מחשיפה בבית/מסך.' },
      { level: 3, cefr: 'A1-',     cap: 'מזהה חלק ניכר מאוצר־הליבה ועוקב אחרי הנחיות קצרות.' },
      { level: 4, cefr: 'A1',      cap: 'אוצר קליטה רחב — אולי כבר אומר מילים או ביטוי קצר.' }
    ];
    var BOTTOMLINE = {
      1: 'בתחילת הדרך באנגלית — לומי ילווה בקצב עדין ובהרבה תמיכה.',
      2: 'ניצנים של אנגלית — מזהה כמה מילים מוכרות, ומוכן להרחיב.',
      3: 'בסיס יפה — מזהה חלק ניכר מאוצר־הליבה ומבין הנחיות קצרות.',
      4: 'חשיפה עשירה — אוצר רחב, אפשר לאתגר קצת יותר.'
    };
    var TIER_LABEL = { 1: 'תמיכה מלאה', 2: 'רגיל', 3: 'אתגר' };
    var TOPIC_HE = { animals: 'חיות', colors: 'צבעים', fruits: 'פירות', actions: 'מילות־פעולה', numbers: 'מספרים' };
    var CANDO_HE = { 'recognize-basic-word': 'זיהוי מילים', 'follow-instruction': 'הבנת הנחיה', 'recognize-quantity': 'זיהוי כמות' };
    var RECOMMENDED_TIER = { 1: 1, 2: 1, 3: 2, 4: 3 };

    function read() { try { return JSON.parse(localStorage.getItem('lumi-profile')) || null; } catch (e) { return null; } }
    function write(p) { try { localStorage.setItem('lumi-profile', JSON.stringify(p)); } catch (e) {} }

    function toast(msg) {
      toastEl.textContent = msg; toastEl.classList.add('show');
      clearTimeout(toast._t); toast._t = setTimeout(function () { toastEl.classList.remove('show'); }, 1800);
    }

    function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }

    function render() {
      var p = read();
      var name = (p && p.name) || '';

      if (!p || !p.level) {
        shell.innerHTML =
          '<div class="head"><div class="lumi"></div><div><h1>הפרופיל של הילד/ה</h1>' +
            '<div class="sub">מסך הורה · מיפוי פתיחה</div></div></div>' +
          '<div class="card empty"><div class="big"></div>' +
            '<h2 style="justify-content:center">עדיין אין פרופיל</h2>' +
            '<p>כדי לבנות את פרופיל־הפתיחה, שחקו קודם את "בואו נכיר" — מיפוי קצר שבו לומי מכיר מה הילד/ה כבר יודע/ת באנגלית.</p>' +
            '<button class="btn btn-coral" id="toMapping" style="margin-top:14px">בואו נכיר ➜</button></div>';
        document.getElementById('toMapping').addEventListener('click', function () {
          location.href = 'mapping.html' + (name ? '?name=' + encodeURIComponent(name) : '');
        });
        return;
      }

      var recTier = RECOMMENDED_TIER[p.level] || 2;
      var curTier = (p.tier === 1 || p.tier === 2 || p.tier === 3) ? p.tier : recTier;
      var when = '';
      try { if (p.at) when = new Date(p.at).toLocaleDateString('he-IL'); } catch (e) {}

      // ladder rungs
      var ladder = RUNGS.map(function (r) {
        var cls = r.level < p.level ? 'done' : (r.level === p.level ? 'here' : 'future');
        var mark = r.level < p.level ? '<span class="r-ev">כבר יש ✓</span>'
          : (r.level === p.level
              ? '<span class="r-here">כאן מתחילים לתרגל ←</span>' +
                (typeof p.correct === 'number' ? ' <span class="r-ev">זיהה ' + p.correct + '/' + p.total + '</span>' : '')
              : '');
        return '<div class="rung ' + cls + '">' +
          '<span class="dot">' + r.level + '</span>' +
          '<div class="body"><div class="r-cefr">' + r.cefr + '</div>' +
          '<div class="r-cap">' + r.cap + '</div>' + mark + '</div></div>';
      }).join('');

      // evidence chips
      var canDoChips = p.byCanDo ? Object.keys(p.byCanDo).map(function (k) {
        var t = p.byCanDo[k];
        return '<span class="chip">' + (CANDO_HE[k] || k) + ' <b>' + t.ok + '/' + t.n + '</b></span>';
      }).join('') : '';
      var topicChips = p.byTopic ? Object.keys(p.byTopic).map(function (k) {
        var t = p.byTopic[k];
        return '<span class="chip">' + (TOPIC_HE[k] || k) + ' <b>' + t.ok + '/' + t.n + '</b></span>';
      }).join('') : '';
      var helloChip = p.saidHello ? '<span class="chip">אמר/ה hello <b>✓</b></span>' : '';

      // tier buttons
      var tierBtns = [1, 2, 3].map(function (t) {
        return '<button class="tier-btn ' + (t === curTier ? 'on' : '') + '" data-tier="' + t + '">' +
          '<div class="t-n">' + t + '</div><div class="t-l">' + TIER_LABEL[t] + '</div>' +
          '<span class="t-rec">' + (t === recTier ? 'מומלץ' : '') + '</span></button>';
      }).join('');

      shell.innerHTML =
        '<div class="head"><div class="lumi"></div><div>' +
          '<h1>הפרופיל של ' + (name ? esc(name) : 'הילד/ה') + '</h1>' +
          '<div class="sub">מיפוי פתיחה' + (when ? ' · ' + when : '') + '</div></div></div>' +

        '<div class="card bottomline">' +
          '<span class="bl-band">' + (p.cefr || '') + ' · ' + (['','טרם חשיפה','ניצני חשיפה','חשיפה בונה','חשיפה עשירה'][p.level] || '') + '</span>' +
          '<div class="bl-text">' + (BOTTOMLINE[p.level] || '') + '</div>' +
        '</div>' +

        '<div class="card"><h2><span class="ic">🪜</span> סולם הרכישה באנגלית</h2>' +
          '<div class="ladder">' + ladder + '</div></div>' +

        '<div class="card"><h2><span class="ic">🔍</span> מה ראינו במיפוי</h2>' +
          '<div class="evrow">' + canDoChips + helloChip + '</div>' +
          '<div class="evrow" style="margin-top:8px">' + topicChips + '</div></div>' +

        '<div class="card"><h2><span class="ic">🎚️</span> עומק התרגול במשחקים</h2>' +
          '<div class="tier-row">' + tierBtns + '</div>' +
          '<p class="tier-note">כל הילדים משחקים את אותה מפה — הרמה קובעת כמה תמיכה או אתגר בכל משחק (מספר האפשרויות). ' +
          'זו המלצה; אפשר לשנות, וזה משפיע מיד על המשחקים. אם במשחק זה קל/קשה מדי — כדאי מבט.</p></div>' +

        '<button class="btn btn-ghost" id="reRun">מיפוי מחדש 🔄</button>' +

        '<div class="caveat">מיפוי אורלי · CEFR Band 1 (Pre-A1/A1, מעוגן לכיתה ג׳ — מוסק כלפי־מטה לגיל 6) · ' +
          (p.calibrated ? '' : 'ספים לא־מכוילים · ') + 'זו השערת פתיחה שמתעדכנת מהמשחק, לא גזר־דין.</div>';

      // tier override → write back (the games read this immediately)
      shell.querySelectorAll('.tier-btn').forEach(function (b) {
        b.addEventListener('click', function () {
          var t = parseInt(b.getAttribute('data-tier'), 10);
          var prof = read(); if (!prof) return;
          prof.tier = t; prof.tierBy = (t === recTier ? 'system' : 'adult'); prof.tierAt = new Date().toISOString();
          write(prof);
          shell.querySelectorAll('.tier-btn').forEach(function (x) { x.classList.toggle('on', parseInt(x.getAttribute('data-tier'), 10) === t); });
          toast('עומק התרגול עודכן ל־' + TIER_LABEL[t]);
        });
      });
      document.getElementById('reRun').addEventListener('click', function () {
        location.href = 'mapping.html' + (name ? '?name=' + encodeURIComponent(name) : '');
      });
    }

    render();
    // if returning to this tab after a mapping run, reflect the fresh profile
    window.addEventListener('pageshow', render);
  })();
  </script>
</body>
</html>
