<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2e2440">
<title>Lumi · שער הכניסה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/components.css">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body { font-family: var(--font-ui, 'Heebo', system-ui, sans-serif); color: #fff6ec; }

  /* the real Lantern Grove IS the hero — show it, don't bury it. Only light gradients
     at top (for the wordmark) and bottom (for the panel) so the art stays vivid. */
  .gate { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center;
    justify-content: space-between; text-align: center; padding: max(22px, env(safe-area-inset-top)) 20px 0; }
  .gate-bg { position: fixed; inset: 0; z-index: -2;
    background: #2e2440 center/cover no-repeat url(assets/worlds/lantern-grove/backgrounds/grove-bg.png); }
  .gate-bg::before { content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(46,36,64,.42) 0%, transparent 24%, transparent 52%, rgba(46,36,64,.5) 100%); }

  /* ---- top: wordmark over the twilight sky ---- */
  .top { display: flex; flex-direction: column; align-items: center; gap: 4px; z-index: 2; }
  .wordmark { font-size: clamp(40px, 12vw, 62px); font-weight: 900; letter-spacing: .5px; line-height: .95;
    color: #fff6ec; text-shadow: 0 3px 20px rgba(255,201,92,.55), 0 2px 8px rgba(46,36,64,.7); }
  .wordmark .dot { color: var(--lantern-lit, #ffd257); }
  .tagline { font-size: clamp(14px, 3.8vw, 18px); font-weight: 700; color: #ffe8d2;
    text-shadow: 0 2px 10px rgba(46,36,64,.8); display: flex; flex-direction: column; gap: 1px; }
  .tagline .en { font-size: .82em; opacity: .82; direction: ltr; letter-spacing: .3px; }

  /* ---- middle: Lumi, floating in the grove ---- */
  .hero { flex: 1; min-height: 0; align-self: stretch; margin: 6px 0;
    background: center/contain no-repeat url(assets/character/lumi/lumi-happy.png);
    filter: drop-shadow(0 18px 30px rgba(0,0,0,.5)); animation: float 4.5s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0) rotate(-1.2deg); } 50% { transform: translateY(-14px) rotate(1.2deg); } }

  /* ---- bottom: a frosted panel that lets the grove glow through ---- */
  .panel { width: min(460px, 100%); background: rgba(255,246,236,.82); backdrop-filter: blur(14px) saturate(1.2);
    color: var(--ink, #3a2b2b); border-radius: 28px 28px 0 0; padding: 20px 22px calc(20px + env(safe-area-inset-bottom));
    box-shadow: 0 -10px 40px rgba(46,36,64,.4); border-top: 1px solid rgba(255,255,255,.6);
    display: flex; flex-direction: column; gap: 12px; z-index: 2; }
  .panel h1 { margin: 0; font-size: clamp(19px, 5vw, 24px); font-weight: 900; color: var(--dusk-deep, #2e2440); }
  .panel .lead { margin: 0; font-size: clamp(14px, 3.7vw, 16px); font-weight: 500; line-height: 1.45; color: var(--ink-soft, #7a6a68); }

  .name-field { display: flex; align-items: center; gap: 10px; background: #fff; border: 2px solid var(--card-edge, #ffe3c4);
    border-radius: 16px; padding: 4px 6px 4px 14px; transition: border-color .2s; }
  .name-field:focus-within { border-color: var(--amber, #f5972b); }
  .name-field .ic { font-size: 20px; }
  .name-field input { flex: 1; font-family: inherit; font-size: 17px; font-weight: 700; color: var(--ink, #3a2b2b);
    padding: 11px 4px; min-height: 46px; border: 0; outline: none; background: transparent; }

  .cta { font-size: 19px; font-weight: 800; color: #fff; border: 0; cursor: pointer; width: 100%;
    background: linear-gradient(180deg, var(--coral, #f4785f), var(--coral-deep, #e05a4a));
    padding: 15px 26px; border-radius: 999px; min-height: 58px; box-shadow: 0 10px 24px rgba(224,90,74,.5);
    transition: transform .15s var(--ease, ease); }
  .cta:active { transform: scale(.96); }
  .cta-note { margin: 0; text-align: center; font-size: 13px; font-weight: 600; color: var(--ink-soft, #7a6a68); }
</style>
</head>
<body>
  <div class="gate-bg"></div>

  <main class="gate">
    <div class="top">
      <div class="wordmark">Lumi<span class="dot">.</span></div>
      <div class="tagline">
        <span>כָּל מִלָּה מְאִירָה אֶת הַדֶּרֶךְ</span>
        <span class="en">Every word lights the way</span>
      </div>
    </div>

    <div class="hero" aria-hidden="true"></div>

    <section class="panel">
      <h1>בְּרוּכִים הַבָּאִים לַמַּסָּע 🏮</h1>
      <p class="lead">כָּל מִלָּה בְּאַנְגְּלִית שֶׁתִּלְמְדוּ מַדְלִיקָה פַּנָּס בַּדֶּרֶךְ שֶׁל לוּמִי.</p>

      <div class="name-field">
        <span class="ic">🙂</span>
        <input id="childName" type="text" inputmode="text" autocomplete="off"
               placeholder="אֵיךְ קוֹרְאִים לַיֶּלֶד/ה?" maxlength="24" aria-label="שם הילד">
      </div>

      <button class="cta" id="startBtn" type="button">בּוֹאוּ נַתְחִיל ➜</button>
      <p class="cta-note">קוֹדֶם נַכִּיר מָה אַתֶּם כְּבָר יוֹדְעִים 🏮</p>
    </section>
  </main>

  <script src="js/audio.js"></script>
  <script src="js/audio-clips.js"></script>
  <script>
  (function () {
    'use strict';
    var nameEl = document.getElementById('childName');
    try { var prev = localStorage.getItem('lumi-student-name'); if (prev) nameEl.value = prev; } catch (e) {}

    document.getElementById('startBtn').addEventListener('click', function () {
      var name = (nameEl.value || '').trim();
      try {
        if (name) localStorage.setItem('lumi-student-name', name);
        localStorage.setItem('lumi-entry', JSON.stringify({ name: name || null, gate: 'v2' }));
      } catch (e) {}
      location.href = 'mapping.html' + (name ? ('?name=' + encodeURIComponent(name)) : '');
    });
    nameEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') document.getElementById('startBtn').click(); });
  })();
  </script>
</body>
</html>
